name: Commitlint

on:
  pull_request:

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          # commitlint here comes from the repo lockfile (v19, Node-20 compatible);
          # Node from .nvmrc so the floor moves deliberately and in one place.
          node-version-file: .nvmrc
      - run: npm clean-install
      - name: Validate PR commit messages
        run: >-
          npx commitlint
          --from ${{ github.event.pull_request.base.sha }}
          --to ${{ github.event.pull_request.head.sha }}
          --verbose
