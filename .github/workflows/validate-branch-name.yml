# .github/workflows/validate-branch-name.yml
name: Validate Branch Name

on:
  pull_request:
    types: [opened, edited, reopened]

permissions:
  contents: read

jobs:
  check-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base branch policy
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
          path: .base-policy

      - name: Check branch name
        shell: bash
        run: |
          # Source policy from the PR base commit so PR changes cannot alter validation.
          # Transitional fallback: the config moved from the repo root to scripts/ — until
          # that move is on the base branch, older base commits still have it at the root.
          # Both paths are inside the BASE checkout, so the security property holds.
          POLICY="${GITHUB_WORKSPACE}/.base-policy/scripts/branch-name-config.sh"
          if [[ ! -f "$POLICY" ]]; then
            POLICY="${GITHUB_WORKSPACE}/.base-policy/branch-name-config.sh"
          fi
          # shellcheck source=/dev/null
          source "$POLICY"
          BRANCH_NAME="${{ github.head_ref }}"
          echo "Branch name: $BRANCH_NAME"

          if [[ ! "$BRANCH_NAME" =~ $BRANCH_REGEX && ! "$BRANCH_NAME" =~ $SNYK_REGEX ]]; then
            echo "❌ Branch name '$BRANCH_NAME' does not follow naming convention."
            exit 1
          fi

          echo "✅ Branch name '$BRANCH_NAME' follows naming convention."
