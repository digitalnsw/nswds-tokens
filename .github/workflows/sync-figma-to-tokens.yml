name: Sync Figma variables to tokens
on:
  workflow_dispatch:
    inputs:
      file_key:
        description: 'The file key of the Figma file to be updated'
        required: true

jobs:
  sync-figma-to-tokens:
    runs-on: ubuntu-latest
    permissions:
      # Need to be able to create new branches and commits
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Install dependencies
        run: npm clean-install

      - name: Sync variables in Figma file to tokens
        run: npm run sync-figma-to-tokens -- --output tokens
        env:
          FILE_KEY: ${{ github.event.inputs.file_key }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.GH_ACTION_VARIABLES_SYNC_FIGMA_TOKEN }}

      - name: Rebuild committed package outputs
        run: npm run build

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: |
            feat(tokens): sync Figma tokens and rebuild package outputs
            - Sync latest design token values from Figma design system
            - Rebuild committed package artifacts via npm run build
            - Regenerate published dist outputs derived from the updated tokens
          title: 'feat(tokens): sync Figma tokens and rebuild package outputs'
          body: |
            Sync generated token source files from Figma and rebuild the committed package outputs that depend on them.

            Source Figma file: https://www.figma.com/file/${{ github.event.inputs.file_key }}

            This PR includes:
            - updated files under `tokens/`
            - regenerated derived package outputs under `dist/`
          add-paths: |
            tokens
            dist
          branch: chore/update-tokens
